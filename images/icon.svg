<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e86c2c"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8d6f0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="128" height="128" rx="20" ry="20" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- PHP letters -->
  <!-- P -->
  <text x="10" y="76"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="56"
    letter-spacing="-2"
    fill="url(#text)">PHP</text>

  <!-- Orange underline accent bar -->
  <rect x="10" y="84" width="108" height="4" rx="2" fill="url(#accent)"/>

  <!-- LSP label -->
  <text x="64" y="108"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="15"
    letter-spacing="4"
    text-anchor="middle"
    fill="#e86c2c"
    fill-opacity="0.9">LSP</text>

  <!-- Small Rust-inspired gear hint — three dots top-right -->
  <circle cx="104" cy="18" r="3" fill="#e86c2c" fill-opacity="0.7"/>
  <circle cx="114" cy="18" r="3" fill="#e86c2c" fill-opacity="0.45"/>
  <circle cx="94"  cy="18" r="3" fill="#e86c2c" fill-opacity="0.25"/>
</svg>

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: darwin-x64
            os: macos-13
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: linux-x64
            os: ubuntu-24.04
          - target: win32-x64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download php-lsp binary
        run: node scripts/download-binary.mjs --target ${{ matrix.target }}

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx vsce package --target ${{ matrix.target }} --out php-lsp-${{ matrix.target }}.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-lsp-${{ matrix.target }}
          path: php-lsp-${{ matrix.target }}.vsix

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest
    environment: marketplace

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish all targets
        run: |
          for vsix in artifacts/*.vsix; do
            echo "Publishing $vsix..."
            npx vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.vsix
          generate_release_notes: true

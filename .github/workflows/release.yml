name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: linux-x64
            os: ubuntu-24.04
          - target: win32-x64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync package.json version from tag
        shell: bash
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Type-check TypeScript
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Download php-lsp binary
        shell: bash
        run: node scripts/download-binary.mjs --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package extension
        shell: bash
        run: npx vsce package --target ${{ matrix.target }} --out php-lsp-${{ matrix.target }}.vsix
        env:
          TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: php-lsp-${{ matrix.target }}
          path: php-lsp-${{ matrix.target }}.vsix
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.vsix
          generate_release_notes: true
